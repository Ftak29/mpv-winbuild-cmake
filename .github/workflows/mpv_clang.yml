name: mpv clang

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Run custom command before building"
        required: false
        type: string
      mpv_tarball:
        description: "Build latest mpv tarball"
        required: false
        default: false
        type: boolean

jobs:
  build_mpv:
    name: Build mpv (clang, x86_64)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/shinchiro/archlinux:latest
    env:
      BIT: x86_64
      arch: x86_64

    outputs:
      mpv_ver: ${{ steps.build_mpv_step.outputs.mpv_ver }}

    steps:
      - name: Setup git config
        run: |
          set -euxo pipefail
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Compute cache suffix
        id: cache_suffix
        run: |
          set -euxo pipefail
          echo "suffix=${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt','cmake/**','packages/**','toolchain/**','.github/workflows/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore clang_root cache
        id: clang_root_cache
        uses: actions/cache/restore@v4
        with:
          path: clang_root
          key: ${{ secrets.CACHE_VERSION }}-clang_root-${{ steps.cache_suffix.outputs.suffix }}
          restore-keys: |
            ${{ secrets.CACHE_VERSION }}-clang_root-${{ github.ref_name }}-
            ${{ secrets.CACHE_VERSION }}-clang_root-

      - name: Restore repository cache
        id: repository_cache
        uses: actions/cache/restore@v4
        with:
          path: src_packages
          key: ${{ secrets.CACHE_VERSION }}-repository-${{ steps.cache_suffix.outputs.suffix }}
          restore-keys: |
            ${{ secrets.CACHE_VERSION }}-repository-${{ github.ref_name }}-
            ${{ secrets.CACHE_VERSION }}-repository-

      - name: Restore x86_64 toolchain cache
        id: x86_64_cache
        uses: actions/cache/restore@v4
        with:
          path: build_x86_64
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ steps.cache_suffix.outputs.suffix }}
          restore-keys: |
            ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ github.ref_name }}-
            ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-

      - name: Running custom command
        if: ${{ github.event.inputs.command != '' }}
        continue-on-error: true
        run: ${{ github.event.inputs.command }}

      - name: Configure CMake & download sources
        run: |
          set -euxo pipefail
          cmake \
            -DTARGET_ARCH=${{ env.arch }}-w64-mingw32 \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX="$PWD/clang_root" \
            -DMINGW_INSTALL_PREFIX="$PWD/build_${{ env.BIT }}/${{ env.BIT }}-w64-mingw32" \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/clang_root/install_rustup" \
            -DENABLE_CCACHE=ON \
            -DCLANG_PACKAGES_LTO=ON \
            -G Ninja \
            --fresh \
            -B build_${{ env.BIT }} \
            -S "$PWD"

          # Pre-fetch sources (non-fatal if already present)
          ninja -C build_${{ env.BIT }} download || true

      - name: Build mpv
        id: build_mpv_step
        env:
          MPV_TARBALL: ${{ github.event.inputs.mpv_tarball }}
        run: |
          set -euxo pipefail
          ninja -C build_${{ env.BIT }} update

          if [[ "$MPV_TARBALL" == "true" ]]; then
            ninja -C build_${{ env.BIT }} mpv-release
            echo "mpv_ver=$(cat build_${{ env.BIT }}/packages/mpv-release-prefix/VERSION)" >> "$GITHUB_OUTPUT"
          else
            ninja -C build_${{ env.BIT }} mpv
            echo "mpv_ver=UNKNOWN" >> "$GITHUB_OUTPUT"
          fi

      - name: Package mpv
        run: |
          set -euxo pipefail
          mkdir -p release_${{ env.BIT }}
          ninja -C build_${{ env.BIT }} mpv-packaging
          mv build_${{ env.BIT }}/mpv*.7z release_${{ env.BIT }}/

      - name: Copy ffmpeg
        run: |
          set -euxo pipefail
          hash=$(git -C src_packages/ffmpeg rev-parse --short HEAD)
          7z a -m0=lzma2 -mx=9 -ms=on \
            release_${{ env.BIT }}/ffmpeg-${{ env.arch }}-git-$hash.7z \
            ./build_${{ env.BIT }}/${{ env.BIT }}-w64-mingw32/bin/ffmpeg.exe

      - name: Collect logs
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p build_${{ env.BIT }}_logs
          cp -fr $(find build_${{ env.BIT }} -type f -iname "*-*.log" -or -wholename "*/ffbuild/config.log" || true) build_${{ env.BIT }}_logs || true
          7z a -m0=lzma2 -mx=9 -ms=on logs.7z build_${{ env.BIT }}_logs

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpv-x86_64-logs
          path: logs.7z
          retention-days: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpv-x86_64
          path: release_${{ env.BIT }}/*.7z
          retention-days: 1
