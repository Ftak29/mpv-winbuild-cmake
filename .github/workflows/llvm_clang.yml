name: llvm toolchain

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Run custom command before building"
        required: false
        type: string

jobs:
  build_llvm:
    name: Build LLVM/Clang toolchain (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/shinchiro/archlinux:latest

    steps:
      - name: Setup git config
        run: |
          set -euxo pipefail
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory /__w/*

      - uses: actions/checkout@v4
        with:
          ref: master

      # Cache key strategy:
      # - CACHE_VERSION: bump manually to force clean rebuilds (v1 -> v2)
      # - github.ref_name: keeps separate caches per branch
      # - hashFiles: invalidates cache if you change build scripts/patches/workflows
      - name: Compute cache suffix
        id: cache_suffix
        run: |
          echo "suffix=${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt','cmake/**','packages/**','toolchain/**','.github/workflows/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore clang_root cache
        id: clang_root_cache
        uses: actions/cache/restore@v4
        with:
          path: clang_root
          key: ${{ secrets.CACHE_VERSION }}-clang_root-${{ steps.cache_suffix.outputs.suffix }}
          restore-keys: |
            ${{ secrets.CACHE_VERSION }}-clang_root-${{ github.ref_name }}-
            ${{ secrets.CACHE_VERSION }}-clang_root-

      - name: Restore x86_64 toolchain cache
        id: x86_64_cache
        uses: actions/cache/restore@v4
        with:
          path: build_x86_64
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ steps.cache_suffix.outputs.suffix }}
          restore-keys: |
            ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ github.ref_name }}-
            ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-

      - name: Running custom command
        if: ${{ github.event.inputs.command != '' }}
        continue-on-error: true
        run: ${{ github.event.inputs.command }}

      # First-time (or cache-miss) build of LLVM with PGO instrumentation
      - name: Build LLVM (PGO GEN) + rustup + cleanup
        if: ${{ steps.clang_root_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euxo pipefail
          cmake \
            -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DLLVM_ENABLE_PGO=GEN \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX="$PWD/clang_root" \
            -DMINGW_INSTALL_PREFIX="$PWD/build_x86_64/x86_64-w64-mingw32" \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/clang_root/install_rustup" \
            -G Ninja \
            -B build_x86_64 \
            -S "$PWD"

          ninja -C build_x86_64 llvm
          ninja -C build_x86_64 rustup
          ninja -C build_x86_64 cargo-clean

      # Build the actual x86_64 clang toolchain (cache-miss only)
      - name: Build x86_64 toolchain
        if: ${{ steps.x86_64_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euxo pipefail
          cmake \
            -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DLLVM_ENABLE_PGO=GEN \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX="$PWD/clang_root" \
            -DMINGW_INSTALL_PREFIX="$PWD/build_x86_64/x86_64-w64-mingw32" \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/clang_root/install_rustup" \
            -G Ninja \
            -B build_x86_64 \
            -S "$PWD"

          ninja -C build_x86_64 llvm-clang

      # Optional PGO training step (shaderc) only on fresh clang_root
      - name: PGO training (shaderc)
        if: ${{ steps.clang_root_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euxo pipefail
          cmake \
            -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DLLVM_ENABLE_PGO=GEN \
            -DCLANG_PACKAGES_LTO=ON \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX="$PWD/clang_root" \
            -DMINGW_INSTALL_PREFIX="$PWD/build_x86_64/x86_64-w64-mingw32" \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/clang_root/install_rustup" \
            -G Ninja \
            -B build_x86_64 \
            -S "$PWD"

          ninja -C build_x86_64 shaderc

      - name: Merge profraw -> profdata
        if: ${{ steps.clang_root_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euxo pipefail
          llvm-profdata merge "$PWD/clang_root/profiles/"*.profraw -o llvm.profdata
          rm -rf "$PWD/clang_root/profiles/"* || true

      - name: Build LLVM (PGO USE)
        if: ${{ steps.clang_root_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euxo pipefail
          cmake \
            -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DLLVM_ENABLE_PGO=USE \
            -DLLVM_PROFDATA_FILE="llvm.profdata" \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX="$PWD/clang_root" \
            -DMINGW_INSTALL_PREFIX="$PWD/build_x86_64/x86_64-w64-mingw32" \
            -DSINGLE_SOURCE_LOCATION="$PWD/src_packages" \
            -DRUSTUP_LOCATION="$PWD/clang_root/install_rustup" \
            -G Ninja \
            -B build_x86_64 \
            -S "$PWD"

          ninja -C build_x86_64 llvm

      - name: Cleanup (reduce cache size)
        run: |
          rm -rf build_x86_64/{toolchain,packages} || true

      - name: Collect logs
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p build_x86_64_logs
          cp -fr $(find build_x86_64 -type f -iname "*-*.log" || true) build_x86_64_logs || true
          7z a -m0=lzma2 -mx=9 -ms=on logs.7z build_x86_64_logs

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs.7z
          retention-days: 1

      - name: Upload toolchain artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toolchain
          path: clang_root
          retention-days: 1

      - name: Save clang_root cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: clang_root
          key: ${{ secrets.CACHE_VERSION }}-clang_root-${{ steps.cache_suffix.outputs.suffix }}

      - name: Save x86_64 toolchain cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build_x86_64
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ steps.cache_suffix.outputs.suffix }}
